<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

<body>

    <!-- ════════ NAVBAR ════════ -->

        <div class="nav-logo">Hospodský Bordel</div>
        <ul class="nav-links">
            <li><a href="index.html">Úvod</a></li>
            <li><a href="koncerty.html">Koncerty</a></li>
            <li><a href="hudba.html">Hudba</a></li>
            <li><a href="kapela.html">Kapela</a></li>
            <li><a href="fotky.html">Fotky</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
            <li><a class="nav-cta" href="vstupenky.html">Vstupenky</a></li>
        </ul>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- Mobile Nav Overlay -->
    <div class="mobile-nav" id="mobileNav">
        <a href="index.html" onclick="closeMobile()">Úvod</a>
        <a href="koncerty.html" onclick="closeMobile()">Koncerty</a>
        <a href="hudba.html" onclick="closeMobile()">Hudba</a>
        <a href="kapela.html" onclick="closeMobile()">Kapela</a>
        <a href="fotky.html" onclick="closeMobile()">Fotky</a>
        <a href="kontakt.html" onclick="closeMobile()">Kontakt</a>
        <a class="nav-cta" href="vstupenky.html" onclick="closeMobile()">Vstupenky</a>
    </div>

    <!-- ════════ HERO ════════ -->
    <section class="hero" id="hero">
        <div class="hero-video-wrap">
            <iframe
                src="https://www.youtube.com/embed/bd16NjNJO9s?autoplay=1&mute=1&loop=1&playlist=bd16NjNJO9s&controls=0&showinfo=0&modestbranding=1&rel=0&playsinline=1&disablekb=1&iv_load_policy=3"
                allow="autoplay; encrypted-media"
                allowfullscreen
                loading="lazy"
                title="Hospodský Bordel — Hero Video"
            ></iframe>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-ctas fade-in">
                <a href="koncerty.html" class="btn-outline btn-mobile-only">Koncerty</a>
                <a href="vstupenky.html" class="btn-primary btn-mobile-only">Vstupenky</a>
                <a href="hudba.html" class="btn-outline btn-album">Naše debutové album je na cestě</a>
            </div>
            <p class="footer-follow">Sleduj nás</p>
            <div class="hero-socials fade-in">
                <a href="https://www.facebook.com/hospodskybordel/" target="_blank" rel="noopener" title="Facebook" class="sl-fb"><img src="https://cdn.simpleicons.org/facebook/ffffff" alt="Facebook" class="social-icon"></a>
                <a href="https://www.instagram.com/hospodskybordel/" target="_blank" rel="noopener" title="Instagram" class="sl-ig"><img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram" class="social-icon"></a>
                <a href="https://www.tiktok.com/@hospodskybordel" target="_blank" rel="noopener" title="TikTok" class="sl-tt"><img src="https://cdn.simpleicons.org/tiktok/ffffff" alt="TikTok" class="social-icon"></a>
                <a href="https://www.youtube.com/@hospodskybordel" target="_blank" rel="noopener" title="YouTube" class="sl-yt"><img src="https://cdn.simpleicons.org/youtube/ffffff" alt="YouTube" class="social-icon"></a>
                <a href="#" target="_blank" rel="noopener" title="Spotify" class="sl-sp"><img src="https://cdn.simpleicons.org/spotify/ffffff" alt="Spotify" class="social-icon"></a>

            <p class="hero-copy">&copy; 2026 Hospodský Bordel</p>
        </div>
    </section>


    <footer class="footer">
        <p class="footer-copy" style="text-align:left">&copy; 2026 Hospodský Bordel</p>
    </footer>

    <!-- ════════ SCRIPTS ════════ -->
    <script>
        // ── Hamburger Toggle ──
        const hamburger = document.getElementById('hamburger');
        const mobileNav = document.getElementById('mobileNav');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileNav.classList.toggle('active');
            document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
        });

        function closeMobile() {
            hamburger.classList.remove('active');
            mobileNav.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ── Navbar Shrink on Scroll ──
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 60);
        });

        // ── Scroll Fade-In Animation ──
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    </script>

</body>
</html>
